name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Quality gates ──────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate MDX frontmatter
        run: npm run validate:content

      - name: Validate taxonomy relations
        run: npm run validate:taxonomy

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Run tests with coverage
        run: npx vitest run --coverage
        env:
          NODE_ENV: test

      - name: Verify coverage ≥ 40%
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "❌ coverage-summary.json not found — run 'npm run test' with @vitest/coverage-v8 installed"
            exit 1
          fi
          COVERAGE=$(node -e "
            const d = require('./coverage/coverage-summary.json');
            console.log(Math.round(d.total.statements.pct));
          " 2>/dev/null || echo "0")
          echo "Statement coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 40 ]; then
            echo "❌ Coverage ${COVERAGE}% is below the 40% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the 40% threshold"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ── Stage 1b: API Quality Gates ────────────────────────────────────────
  api-check:
    name: API — Type Check, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run API tests with coverage
        run: npm run test:coverage

      - name: Upload API coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage/

  # ── Stage 2: Build ─────────────────────────────────────────────────────
  build:
    name: Build & Export
    needs: [quality, api-check]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://jootacee.com
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build + postbuild (sitemap, RSS, OG, Pagefind index)
        run: npm run build

      - name: Content QA (placeholder scan + route check)
        run: npm run qa:content

      - name: Security audit (deps + headers + secret scan)
        run: node scripts/security-audit.mjs
        continue-on-error: true

      - name: Launch checklist (pre-deploy gate)
        run: node scripts/launch-checklist.mjs
        env:
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
        continue-on-error: true

      - name: Project health snapshot (audit + history)
        run: node scripts/project-snapshot.mjs --no-tests --json
        continue-on-error: true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # ── Stage 3: Lighthouse ────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run Lighthouse CI (desktop)
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Bundle size check
        run: |
          TOTAL=$(find dist -name "*.js" | xargs du -b 2>/dev/null | awk '{sum+=$1} END {print sum}')
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total JS dist size: ${TOTAL_KB} KB raw"
          if [ "$TOTAL_KB" -gt 12000 ]; then
            echo "❌ JS bundle too large: ${TOTAL_KB} KB (limit: 12 MB raw)"
            exit 1
          fi
          echo "✅ Bundle size within budget: ${TOTAL_KB} KB"

  # ── Stage 3b: Lighthouse CI — mobile ─────────────────────────────────────
  lighthouse-mobile:
    name: Lighthouse CI (mobile)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run Lighthouse CI (mobile)
        run: npx lhci autorun --config=lighthouserc-mobile.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── Stage 4: Deploy to Cloudflare Pages (main branch only) ─────────────
  deploy:
    name: Deploy → Cloudflare Pages
    needs: [quality, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jootacee --commit-dirty=true

      - name: Finalize Sentry release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          npx @sentry/cli releases new ${{ github.sha }}
          npx @sentry/cli releases set-commits ${{ github.sha }} --auto
          npx @sentry/cli releases finalize ${{ github.sha }}
          npx @sentry/cli releases deploys ${{ github.sha }} new -e production

      - name: Post-deploy smoke test
        run: |
          echo "Waiting 10s for Cloudflare CDN propagation…"
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jootacee.com/en/ || echo "000")
          echo "Landing page status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "308" ]; then
            echo "⚠ Post-deploy smoke test returned $STATUS — check Cloudflare Pages"
          else
            echo "✅ Post-deploy smoke test passed ($STATUS)"
          fi
        continue-on-error: true

      - name: Post-deploy content backup
        run: node scripts/backup.mjs --dry-run
        continue-on-error: true
