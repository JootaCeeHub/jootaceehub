# ============================================================
# Nginx configuration — jootacee.com
# Stack: Ubuntu 24.04 · Nginx 1.24+ · PM2 · blue-green slots
# Deploy: copy to /etc/nginx/sites-available/jootacee
#         ln -s /etc/nginx/sites-available/jootacee /etc/nginx/sites-enabled/
#         nginx -t && nginx -s reload
# ============================================================

# ---------------------------------------------------------------------------
# Rate limiting zones (defined in http block — place in nginx.conf if needed)
# ---------------------------------------------------------------------------
# limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
# limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
# limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name jootacee.com www.jootacee.com;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Main HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jootacee.com www.jootacee.com;

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/jootacee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jootacee.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;

    # --- OCSP Stapling ---
    ssl_stapling            on;
    ssl_stapling_verify     on;
    ssl_trusted_certificate /etc/letsencrypt/live/jootacee.com/chain.pem;
    resolver                1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout        5s;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-DNS-Prefetch-Control "off" always;

    # --- Gzip ---
    gzip on;
    gzip_comp_level 6;
    gzip_types text/html text/plain text/css application/json application/javascript
               application/x-javascript text/javascript application/xml text/xml
               image/svg+xml font/woff font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # --- Rate limiting ---
    limit_req zone=global burst=120 nodelay;

    # --- Static export root (active blue/green slot) ---
    root /var/www/jootacee;
    index index.html;

    # Cache busting for immutable Next.js static assets
    location /_next/static/ {
        alias /var/www/jootacee/_next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Pagefind search index
    location /_pagefind/ {
        alias /var/www/jootacee/_pagefind/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Service worker — must not be cached
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Robots, sitemap, manifest
    location ~* \.(xml|txt|webmanifest)$ {
        expires 24h;
        add_header Cache-Control "public, max-age=86400";
    }

    # Admin panel — no caching, no indexing
    location /admin {
        try_files $uri $uri/ /admin/index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store" always;
    }

    # All other routes — SPA fallback
    location / {
        try_files $uri $uri/ $uri.html /en/index.html;
    }

    # --- Content API proxy ---
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;

        # Auth endpoints — stricter rate limit
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://127.0.0.1:3001/auth/;
        }
    }

    # --- Error pages ---
    error_page 404 /en/index.html;
    error_page 500 502 503 504 /offline.html;
    location = /offline.html {
        root /var/www/jootacee;
        internal;
    }

    # --- Access logs (JSON format for log aggregation) ---
    access_log /var/log/nginx/jootacee.access.log combined;
    error_log  /var/log/nginx/jootacee.error.log warn;

    # Block common exploit paths
    location ~* /(\.git|\.env|wp-admin|xmlrpc\.php|\.htaccess) {
        return 404;
    }
}
