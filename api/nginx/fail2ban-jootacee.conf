# Fail2ban — jootacee VPS
# Install:
#   sudo cp api/nginx/fail2ban-jootacee.conf /etc/fail2ban/jail.d/jootacee.conf
#   sudo systemctl restart fail2ban
#   sudo fail2ban-client status jootacee-nginx
#
# Requires: fail2ban package + nginx logs at /var/log/nginx/

[DEFAULT]
bantime  = 3600    ; 1 hour per ban
findtime = 600     ; count attempts within 10 min window
maxretry = 5       ; ban after 5 failures in findtime

# SSH brute force — most critical
[sshd]
enabled  = true
port     = ssh
logpath  = /var/log/auth.log
maxretry = 3
bantime  = 86400   ; 24h for SSH — more severe

# Nginx: HTTP auth endpoint brute force
[jootacee-nginx-auth]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/access.log
filter   = jootacee-nginx-auth
maxretry = 5
findtime = 300     ; 5 attempts in 5 min
bantime  = 7200    ; 2h

# Nginx: rate limit zone violations (429 responses)
[jootacee-nginx-ratelimit]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/error.log
filter   = jootacee-nginx-ratelimit
maxretry = 10
findtime = 60
bantime  = 3600

# Nginx: scanner / bad bot detection
[jootacee-nginx-badbot]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/access.log
filter   = jootacee-nginx-badbot
maxretry = 2
bantime  = 86400   ; 24h for confirmed scanners
