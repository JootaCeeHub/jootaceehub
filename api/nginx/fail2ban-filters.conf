# Fail2ban filter definitions for jootacee
# Copy to /etc/fail2ban/filter.d/
#
#   sudo cp api/nginx/fail2ban-filters.conf /etc/fail2ban/filter.d/jootacee-nginx-auth.conf
#   sudo cp api/nginx/fail2ban-filters.conf /etc/fail2ban/filter.d/jootacee-nginx-ratelimit.conf
#   sudo cp api/nginx/fail2ban-filters.conf /etc/fail2ban/filter.d/jootacee-nginx-badbot.conf

# --- jootacee-nginx-auth ---
# Matches: POST /api/auth/login returning 401
# Example: 1.2.3.4 - - [01/Jan/2026] "POST /api/auth/login HTTP/1.1" 401 ...
[Definition]
failregex = ^<HOST> .* "POST /api/auth/login HTTP/.*" 401
            ^<HOST> .* "POST /api/auth/token HTTP/.*" 401
ignoreregex =

# --- jootacee-nginx-ratelimit ---
# Matches: Nginx rate limit rejections in error.log
# Example: limiting requests, excess: 30.500 by zone "api", client: 1.2.3.4
[Definition]
failregex = limiting requests, excess: .* by zone ".*", client: <HOST>
ignoreregex =

# --- jootacee-nginx-badbot ---
# Matches: known scanner paths (wp-admin, xmlrpc, .env, .git)
[Definition]
failregex = ^<HOST> .* "(GET|POST|HEAD) /(wp-admin|wp-login|xmlrpc\.php|\.env|\.git|\.htaccess|phpmyadmin|config\.php|shell\.php|eval-stdin\.php) HTTP/.*" (200|301|302|403|404)
ignoreregex =
