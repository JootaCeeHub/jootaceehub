# ============================================================
# Nginx configuration for JOOTACEEHUB Content API + Static Site
#
# Deploy to: /etc/nginx/sites-available/jootacee
# Enable:    ln -s /etc/nginx/sites-available/jootacee /etc/nginx/sites-enabled/
#
# Blue-green deploy: NGINX_ROOT is a symlink managed by atomic-deploy.ts.
# On each successful build the symlink is swapped atomically so Nginx never
# serves a partial build.
# ============================================================

# Upstream for the Hono Content API
upstream content_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

server {
    listen 80;
    listen [::]:80;
    server_name jootacee.com www.jootacee.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jootacee.com www.jootacee.com;

    # ── TLS ─────────────────────────────────────────────────────────────────
    # Update these paths after running certbot
    ssl_certificate     /etc/letsencrypt/live/jootacee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jootacee.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Static site root (blue-green symlink) ────────────────────────────────
    # NGINX_ROOT must be set to the symlink path (e.g. /var/www/jootacee)
    # The symlink is swapped by atomic-deploy.ts on each successful build.
    root /var/www/jootacee;
    index index.html;

    # ── Content API proxy ───────────────────────────────────────────────────
    location /api/ {
        # Strip /api prefix before forwarding to Hono
        rewrite ^/api/(.*) /$1 break;

        proxy_pass         http://content_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — build trigger returns 202 immediately, but allow longer for git ops
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming log responses (build status)
        proxy_buffering off;
    }

    # ── Media files ─────────────────────────────────────────────────────────
    location /media/ {
        alias /srv/jootacee/public/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Allow CORS for images (loaded by external OG scrapers etc.)
        add_header Access-Control-Allow-Origin "*";

        # Serve WebP directly; deny directory listing
        autoindex off;
        try_files $uri =404;
    }

    # ── Static files with long cache ────────────────────────────────────────
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(ico|png|svg|jpg|jpeg|webp|avif|gif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── SPA / Next.js static export fallback ────────────────────────────────
    # All unmatched requests fall through to the HTML entry point.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── Deny hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/jootacee.access.log;
    error_log  /var/log/nginx/jootacee.error.log warn;
}
